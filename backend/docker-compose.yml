services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: thebends
      POSTGRES_USER: thebends
      POSTGRES_PASSWORD: thebends
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:z
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thebends"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    environment:
      DATABASE_URL: postgresql://thebends:thebends@db:5432/thebends
    volumes:
      - ./api/app:/app/app:z
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  tiles:
    image: ghcr.io/maplibre/martin:latest
    environment:
      DATABASE_URL: postgresql://thebends:thebends@db:5432/thebends
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  pipeline:
    build:
      context: ./pipeline
    environment:
      DATABASE_URL: postgresql://thebends:thebends@db:5432/thebends
      DATA_DIR: /data
    volumes:
      - ./data:/data:z
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - pipeline

  # Static host for the Flutter web build + same-origin reverse proxy to the
  # API/tiles (so the web app needs no CORS). Build the web app first:
  #   cd ../frontend && flutter build web --dart-define=API_BASE=https://<host>
  # then:  docker-compose --profile web up -d   (local test at :8080)
  web:
    image: caddy:2-alpine
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:z,ro
      - ../frontend/build/web:/srv:z,ro
    ports:
      - "8080:80"
    depends_on:
      - api
      - tiles
    restart: unless-stopped
    profiles:
      - web

  # Cloudflare Tunnel: exposes everything over HTTPS with no open ports.
  # Token-based connector — create the tunnel + a public-hostname route in the
  # Cloudflare Zero Trust dashboard. Recommended (all-in-one via Caddy):
  #   example.com -> http://web:80   (serves the web app + proxies /api and /tiles)
  # Or route API/tiles directly: api.example.com -> http://api:8000, etc.
  # cloudflared resolves these service names over this compose network. Put the
  # token in backend/.env as CLOUDFLARE_TUNNEL_TOKEN.
  # Start everything:  docker-compose --profile web --profile tunnel up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - api
      - tiles
    restart: unless-stopped
    profiles:
      - tunnel

volumes:
  pgdata:
